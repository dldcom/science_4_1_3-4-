<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>화산 장면 프로토타입</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main id="app">
    <canvas id="scene" aria-label="3D 화산 장면"></canvas>

    <nav class="scene-tabs" aria-label="관찰 장면 선택">
      <button type="button" class="scene-tab active" data-scene="surface" aria-pressed="true">지표 보기</button>
      <button type="button" class="scene-tab" data-scene="underground" aria-pressed="false">지하로 이동</button>
    </nav>

    <section class="intro">
      <p class="eyebrow">3D VOLCANO LAB</p>
      <h1 id="lesson-title">마그마가<br>지표로 나오고 있어요</h1>
      <p id="lesson-copy">화산을 돌려 보거나 확대해서 분화구와 용암의 흐름을 관찰해 보세요.</p>
    </section>

    <section class="cooling-panel" id="cooling-panel" aria-live="polite">
      <div class="cooling-labels">
        <strong id="cooling-title">뜨거운 용암</strong>
        <span id="cooling-percent">0%</span>
      </div>
      <div class="cooling-track">
        <span id="cooling-bar"></span>
      </div>
      <p id="cooling-message">지표 가까이의 용암을 빠르게 식혀 보세요.</p>
    </section>

    <aside class="controls" aria-label="화산 장면 조작">
      <div class="status">
        <span class="pulse"></span>
        <span id="status-text">화산 활동 관찰 중</span>
      </div>
      <button id="erupt" type="button">분출 강하게 보기</button>
      <button id="cool" type="button">빠르게 식히기</button>
      <button id="reset" type="button" class="secondary">처음 위치로</button>
      <div class="quality">
        <span>렌더링 품질</span>
        <strong id="quality-label">자동</strong>
      </div>
      <div class="metrics" id="metrics">성능 측정 중...</div>
    </aside>

    <div class="hint">드래그하여 회전 · 두 손가락으로 확대</div>
  </main>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./app.js"></script>
</body>
</html>
